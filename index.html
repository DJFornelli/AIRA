
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA — AI Revenue Agent</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222537;--border:#2e3147;
  --accent:#e8a045;--accent2:#5b8ef0;--green:#3ecf8e;--red:#f05b5b;
  --yellow:#f0c55b;--orange:#f07c3a;--text:#e8eaf0;--text-muted:#7b82a0;--text-dim:#4a5070;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--orange));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#000;letter-spacing:-.5px;}
.logo-text{font-weight:700;font-size:15px;letter-spacing:-.3px;}
.logo-sub{color:var(--text-muted);font-size:11px;margin-left:4px;}
.review-date{color:var(--text-muted);font-size:11px;font-family:var(--mono);}
.keys-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.key-group{display:flex;align-items:center;gap:8px;}
.key-label{font-size:11px;color:var(--text-muted);white-space:nowrap;font-weight:600;}
.key-input{width:280px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;transition:border-color .2s;}
.key-input:focus{border-color:var(--accent);}
.key-input.valid{border-color:var(--green);}
.key-status{font-size:10px;font-family:var(--mono);}
.upload-zone{margin:24px;border:1.5px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;background:var(--surface);transition:border-color .2s,background .2s;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(232,160,69,.04);}
.upload-icon{font-size:28px;margin-bottom:10px;}
.upload-title{font-weight:600;font-size:15px;margin-bottom:6px;}
.upload-sub{color:var(--text-muted);font-size:12px;}
.upload-hint{color:var(--text-dim);font-size:11px;margin-top:8px;font-family:var(--mono);}
#csv-input{display:none;}
.file-loaded{display:flex;align-items:center;gap:10px;background:rgba(62,207,142,.08);border:1px solid rgba(62,207,142,.25);border-radius:8px;padding:12px 16px;margin:0 24px;}
.file-loaded-icon{color:var(--green);font-size:16px;}
.run-section{padding:16px 24px 24px;display:flex;align-items:center;gap:12px;}
.btn-run{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 24px;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:opacity .2s;font-family:var(--font);}
.btn-run:hover{opacity:.9;}
.btn-run:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:var(--font);}
.btn-secondary:hover{background:var(--border);}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.tabs-wrapper{padding:0 24px;border-bottom:1px solid var(--border);display:flex;gap:2px;overflow-x:auto;}
.tab{padding:10px 14px;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);}
.tab-dot.green{background:var(--green);}
.tab-dot.yellow{background:var(--yellow);}
.tab-dot.orange{background:var(--orange);}
.tab-dot.red{background:var(--red);}
.tab-content{display:none;padding:24px;}
.tab-content.active{display:block;}
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:24px;}
.portfolio-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s;}
.portfolio-card:hover{border-color:var(--accent2);}
.portfolio-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.portfolio-card-name{font-weight:600;font-size:13px;}
.portfolio-card-market{color:var(--text-muted);font-size:11px;margin-top:2px;}
.status-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;font-family:var(--mono);}
.status-badge.pending{background:rgba(123,130,160,.15);color:var(--text-muted);}
.status-badge.ok{background:rgba(62,207,142,.15);color:var(--green);}
.status-badge.alert{background:rgba(240,91,91,.15);color:var(--red);}
.status-badge.warn{background:rgba(240,197,91,.15);color:var(--yellow);}
.pace-bars{display:flex;flex-direction:column;gap:5px;}
.pace-row{display:flex;align-items:center;gap:8px;}
.pace-label{color:var(--text-muted);font-size:10px;width:28px;font-family:var(--mono);}
.pace-bar-wrap{flex:1;height:4px;background:var(--surface2);border-radius:2px;}
.pace-bar{height:100%;border-radius:2px;transition:width .4s;}
.pace-val{font-size:10px;font-family:var(--mono);width:32px;text-align:right;}
.prop-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.prop-title{font-size:18px;font-weight:700;letter-spacing:-.4px;}
.prop-meta{color:var(--text-muted);font-size:12px;margin-top:3px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.card-header{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);}
.card-source{font-size:10px;color:var(--text-dim);font-family:var(--mono);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:7px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);border-bottom:1px solid var(--border);background:rgba(0,0,0,.2);}
td{padding:8px 12px;border-bottom:1px solid rgba(46,49,71,.5);font-size:12px;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.mono{font-family:var(--mono);}
.muted{color:var(--text-muted);}
.dim{color:var(--text-dim);}
.green{color:var(--green);}
.red{color:var(--red);}
.yellow{color:var(--yellow);}
.orange{color:var(--orange);}
.accent{color:var(--accent);}
.chip{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--mono);}
.chip.vfa{background:rgba(62,207,142,.15);color:var(--green);}
.chip.ahead{background:rgba(91,142,240,.15);color:var(--accent2);}
.chip.sa{background:rgba(91,142,240,.1);color:#8ab4f5;}
.chip.ot{background:rgba(123,130,160,.15);color:var(--text-muted);}
.chip.sb{background:rgba(240,197,91,.15);color:var(--yellow);}
.chip.behind{background:rgba(240,124,58,.15);color:var(--orange);}
.chip.vfb{background:rgba(240,91,91,.15);color:var(--red);}
.result-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono);}
.result-chip.worked{background:rgba(62,207,142,.15);color:var(--green);}
.result-chip.partial{background:rgba(240,197,91,.15);color:var(--yellow);}
.result-chip.failed{background:rgba(240,91,91,.15);color:var(--red);}
.result-chip.pending{background:rgba(123,130,160,.15);color:var(--text-muted);}
.escalation-banner{background:rgba(240,91,91,.08);border:1px solid rgba(240,91,91,.25);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--red);display:flex;align-items:center;gap:8px;}
.action-cell{font-size:11px;line-height:1.6;max-width:300px;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(46,49,71,.4);}
.setting-row:nth-child(odd){border-right:1px solid var(--border);}
.setting-label{color:var(--text-muted);font-size:11px;}
.setting-val{font-family:var(--mono);font-size:12px;font-weight:500;}
.setting-rec{font-family:var(--mono);font-size:11px;color:var(--accent);}
.diagnosis-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;}
.diagnosis-header{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.diagnosis-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);}
.confidence-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;font-family:var(--mono);margin-left:auto;}
.confidence-badge.high{background:rgba(62,207,142,.15);color:var(--green);}
.confidence-badge.medium{background:rgba(240,197,91,.15);color:var(--yellow);}
.confidence-badge.low{background:rgba(240,91,91,.15);color:var(--red);}
.diagnosis-body{padding:16px;}
.diag-row{margin-bottom:12px;}
.diag-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin-bottom:4px;}
.diag-text{font-size:12px;line-height:1.6;}
.priority-box{background:rgba(232,160,69,.06);border:1px solid rgba(232,160,69,.2);border-radius:8px;padding:14px 16px;margin-bottom:14px;}
.priority-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin-bottom:10px;}
.priority-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.priority-item:last-child{margin-bottom:0;}
.priority-num{min-width:20px;height:20px;background:var(--accent);color:#000;font-size:10px;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.priority-text{font-size:12px;line-height:1.5;}
.log-entry{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:6px;}
.log-meta{display:flex;gap:12px;margin-bottom:5px;align-items:center;flex-wrap:wrap;}
.log-date{font-family:var(--mono);font-size:11px;color:var(--accent);}
.log-occ{font-family:var(--mono);font-size:12px;font-weight:600;}
.log-7d,.log-15d{font-size:11px;color:var(--text-muted);}
.log-issue{font-size:11px;color:var(--yellow);font-style:italic;}
.log-action{font-size:12px;line-height:1.5;}
.loading-shimmer{height:12px;background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:3px;width:85%;margin:3px 0;}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:12px;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);margin-bottom:8px;}
.note-banner{background:rgba(240,197,91,.08);border:1px solid rgba(240,197,91,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--yellow);}

.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin-bottom:24px;}
.results-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.results-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.accuracy-ring{display:flex;flex-direction:column;align-items:center;gap:2px;}
.accuracy-pct{font-size:22px;font-weight:700;font-family:var(--mono);}

.weekly-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;}
.weekly-date{color:var(--text-muted);font-family:var(--mono);width:60px;}
.weekly-action{flex:1;color:var(--text);}
.monthly-summary{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:12px;}
.monthly-title{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:8px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;}
.stat-label{color:var(--text-muted);}
.stat-val{font-family:var(--mono);font-weight:600;}
.portfolio-accuracy{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px;display:flex;align-items:center;gap:24px;}
.big-number{font-size:48px;font-weight:800;font-family:var(--mono);color:var(--accent);}
.big-label{font-size:12px;color:var(--text-muted);}
.accuracy-breakdown{display:flex;gap:20px;margin-left:auto;}
.acc-stat{text-align:center;}
.acc-stat-num{font-size:20px;font-weight:700;font-family:var(--mono);}
.acc-stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;}
</style>
</head>

<div class="header">

</div>

// ─── GITHUB HISTORY ───────────────────────────────────────────
async function loadHistory(){
  try{
    const resp=await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${HISTORY_FILE}`,{
      headers:{'Authorization':`token ${getGithubToken()}`,'Accept':'application/vnd.github.v3+json'}
    });
    if(resp.ok){
      const data=await resp.json();
      const content=JSON.parse(atob(data.content.replace(/\n/g,'')));
      historyData=content;
      return content;
    }
  }catch(e){console.log('No history file yet — will create on first save.');}
  return{weeks:[],monthly:{}};
}

async function saveHistory(newData){
  try{
    // Get current file sha if exists
    let sha=null;
    try{
      const check=await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${HISTORY_FILE}`,{
        headers:{'Authorization':`token ${getGithubToken()}`,'Accept':'application/vnd.github.v3+json'}
      });
      if(check.ok){const d=await check.json();sha=d.sha;}
    }catch(e){}

    const content=btoa(JSON.stringify(newData,null,2));
    const body={message:`AIRA weekly update — ${new Date().toLocaleDateString()}`,content};
    if(sha)body.sha=sha;

    const resp=await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${HISTORY_FILE}`,{
      method:'PUT',
      headers:{'Authorization':`token ${getGithubToken()}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(resp.ok){toast('✓ Results saved to GitHub');}
    else{toast('⚠️ Could not save to GitHub — check token permissions');}
  }catch(e){toast('⚠️ GitHub save failed: '+e.message);}
}

// ─── SCORE LAST WEEK'S RESULTS ────────────────────────────────
function scoreLastWeek(){
  if(!historyData.weeks||historyData.weeks.length===0)return{};
  const lastWeek=historyData.weeks[historyData.weeks.length-1];
  const scores={};
  KEYS.forEach(k=>{
    const d=getRow(k);
    if(!d||!lastWeek.properties?.[k])return;
    const prev=lastWeek.properties[k];
    if(prev.occ30===null||d.occ30===null)return;
    const prevStatus=prev.occ30_status;
    const newOcc30=d.occ30;
    const prevOcc30=prev.occ30;
    const target=PROPS[k].pace.d30;
    const prevGap=prevOcc30-target;
    const newGap=newOcc30-target;
    let result='pending';
    if(prevGap<-0.05){
      // Was behind — did it improve?
      if(newGap>prevGap+0.05)result='worked';
      else if(newGap>prevGap+0.02)result='partial';
      else result='failed';
    } else if(prevGap>0.05){
      // Was ahead — did it hold?
      if(newGap>=0)result='worked';
      else if(newGap>-0.03)result='partial';
      else result='failed';
    } else {
      result='worked'; // was on track, stayed managed
    }
    scores[k]={result,prevAction:prev.priority_actions?.[0]||'—',prevOcc30,newOcc30,prevGap,newGap};
  });
  return scores;
}

function getConsecutiveFailures(key){
  if(!historyData.weeks||historyData.weeks.length<2)return 0;
  let count=0;
  for(let i=historyData.weeks.length-1;i>=0;i--){
    const w=historyData.weeks[i];
    if(w.scores?.[key]?.result==='failed')count++;
    else break;
  }
  return count;
}

function processFile(file){
  const r=new FileReader();
  r.onload=async e=>{
    csvData=parseCSV(e.target.result);
    const m=KEYS.filter(k=>findRow(PROPS[k].csvName,csvData)).length;
    document.getElementById('upload-section').style.display='none';
    document.getElementById('file-loaded-section').style.display='block';
    document.getElementById('run-section').style.display='flex';
    document.getElementById('file-name-display').textContent=file.name;
    document.getElementById('file-meta-display').textContent=`${csvData.length-1} listings · ${m}/7 properties matched`;

    // Load history from GitHub
    document.getElementById('run-status').textContent='Loading history from GitHub…';
    await loadHistory();
    document.getElementById('run-status').textContent='';

    buildUI();
    document.getElementById('main-content').style.display='block';
  };
  r.readAsText(file);
}

// ─── CSV PARSER ───────────────────────────────────────────────
function parseCSV(txt){
  const ls=txt.split('\n').filter(l=>l.trim());
  const hdrs=csvLine(ls[0]);
  return ls.slice(1).map(l=>{const v=csvLine(l);const o={};hdrs.forEach((h,i)=>o[h.trim()]=(v[i]||'').trim());return o;});
}
function csvLine(l){const r=[];let c='',q=false;for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}
function findRow(name,data){return data.find(r=>{const n=(r['Listing Name']||'').toLowerCase();return n.includes(name.toLowerCase())||name.toLowerCase().split(' ').some(w=>w.length>3&&n.includes(w));});}
function pct(v){if(!v||v==='-'||/blocked/i.test(v))return null;return parseFloat(v.replace('%',''))/100;}
function dol(v){if(!v||v==='-'||/blocked/i.test(v))return null;return parseFloat(v.replace(/[$,\s]/g,''));}

function getRow(key){
  if(!csvData)return null;
  const p=PROPS[key],row=findRow(p.csvName,csvData);
  if(!row)return null;
  return{
    base:dol(row['Base Price']),min:dol(row['Min Price']),max:dol(row['Max Price']),
    occ30:pct(row['Total Occupancy ( Next 30 Days )']),
    occ60:pct(row['Total Occupancy ( Next 60 Days )']),
    occ90:pct(row['Total Occupancy ( Next 90 Days )']),
    occ120:pct(row['Total Occupancy ( Next 120 Days )']),
    mocc30:pct(row['Total Market Occupancy Next 30 Days']),
    mocc60:pct(row['Total Market Occupancy Next 60 Days']),
    mocc90:pct(row['Total Market Occupancy Next 90 Days']),
    wocc30:pct(row['Weekend Total Occupancy ( Next 30 Days )']),
    adr:dol(row['ADR ( Past 30 Days )']),revpar:dol(row['RevPAR ( Past 30 Days )']),
    rev_ytd:dol(row['Total Revenue ( YTD )']),occ_past:pct(row['Total Occupancy ( Past 30 Days )']),
    n7:parseInt(row['Nights Booked ( Past 7 Days )'])||0,
    n15:parseInt(row['Nights Booked ( Past 15 Days )'])||0,
    last_book:row['Last Booked Date']||'—',rec_base:dol(row['Recommended Base Price']),
  };
}

// ─── STATUS ENGINE ────────────────────────────────────────────
function status(cur,tgt){
  if(cur===null)return{label:'N/A',cls:'ot',v:null};
  const v=cur-tgt;
  if(v>=.13)return{label:'Very Far Ahead',cls:'vfa',v};
  if(v>=.06)return{label:'Ahead',cls:'ahead',v};
  if(v>=.03)return{label:'Slightly Ahead',cls:'sa',v};
  if(v>=-0.02)return{label:'On Track',cls:'ot',v};
  if(v>=-0.05)return{label:'Slightly Behind',cls:'sb',v};
  if(v>=-0.12)return{label:'Behind',cls:'behind',v};
  return{label:'Very Far Behind',cls:'vfb',v};
}
function dotCls(ss){
  if(ss.some(s=>s.cls==='vfb'))return'red';
  if(ss.some(s=>s.cls==='behind'))return'orange';
  if(ss.some(s=>s.cls==='sb'))return'yellow';
  return'green';
}
const fp=v=>v!==null?Math.round(v*100)+'%':'N/A';
const fd=v=>v!==null?'$'+Math.round(v).toLocaleString():'N/A';
const fv=v=>v===null?'—':(v>=0?'+':'')+Math.round(v*100)+'%';
const fpp=v=>v!==null?(Math.round(v*100))+'%':'—';
const colorMap={vfa:'#3ecf8e',ahead:'#5b8ef0',sa:'#8ab4f5',ot:'#7b82a0',sb:'#f0c55b',behind:'#f07c3a',vfb:'#f05b5b'};

// ─── BUILD UI ─────────────────────────────────────────────────
function buildUI(){
  const tw=document.getElementById('tabs-wrapper'),tp=document.getElementById('tab-panels');
  tw.innerHTML='';tp.innerHTML='';
  const addTab=(id,label,dotId)=>{
    const t=document.createElement('div');t.className='tab'+(id==='portfolio'?' active':'');
    t.dataset.tab=id;t.innerHTML=`<div class="tab-dot" id="${dotId}"></div>${label}`;
    t.onclick=()=>switchTab(id);tw.appendChild(t);
  };
  addTab('portfolio','Portfolio','dot-portfolio');
  KEYS.forEach(k=>addTab(k,k,`dot-${k.replace(/\s/g,'-')}`));
  addTab('results','📈 Results & Learning','dot-results');

  const addPanel=(id,html)=>{
    const p=document.createElement('div');p.className='tab-content'+(id==='portfolio'?' active':'');
    p.id=`panel-${id.replace(/\s/g,'-')}`;p.innerHTML=html;tp.appendChild(p);
  };
  addPanel('portfolio',buildPortfolio());
  KEYS.forEach(k=>addPanel(k,buildProp(k)));
  addPanel('results',buildResultsTab());
  currentTab='portfolio';
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));
  document.querySelectorAll('.tab-content').forEach(p=>p.classList.toggle('active',p.id===`panel-${id.replace(/\s/g,'-')}`));
  currentTab=id;
}

// ─── RESULTS TAB ──────────────────────────────────────────────
function buildResultsTab(){
  const weeks=historyData.weeks||[];
  const totalWeeks=weeks.length;

  if(totalWeeks===0){
    return`<div style="text-align:center;padding:64px 24px">
      <div style="font-size:48px;margin-bottom:16px">📈</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px">No history yet</div>
      <div class="muted" style="font-size:13px">Run your first weekly analysis to start tracking AIRA's performance.<br>Results are saved to your GitHub repo automatically after each run.</div>
    </div>`;
  }

  // Calculate portfolio accuracy
  let totalScored=0,totalWorked=0,totalPartial=0,totalFailed=0;
  weeks.forEach(w=>{
    Object.values(w.scores||{}).forEach(s=>{
      if(s.result==='worked'){totalWorked++;totalScored++;}
      else if(s.result==='partial'){totalPartial++;totalScored++;}
      else if(s.result==='failed'){totalFailed++;totalScored++;}
    });
  });
  const accuracy=totalScored>0?Math.round((totalWorked+totalPartial*.5)/totalScored*100):0;

  // Monthly rollup
  const monthly=historyData.monthly||{};
  const monthlyHTML=Object.entries(monthly).map(([month,data])=>`
    <div class="monthly-summary">
      <div class="monthly-title">${month}</div>
      <div class="stat-row"><span class="stat-label">Weeks tracked</span><span class="stat-val mono">${data.weeks||0}</span></div>
      <div class="stat-row"><span class="stat-label">Actions worked</span><span class="stat-val green mono">${data.worked||0}</span></div>
      <div class="stat-row"><span class="stat-label">Partial results</span><span class="stat-val yellow mono">${data.partial||0}</span></div>
      <div class="stat-row"><span class="stat-label">Actions failed</span><span class="stat-val red mono">${data.failed||0}</span></div>
      <div class="stat-row"><span class="stat-label">Accuracy rate</span><span class="stat-val mono">${data.accuracy||0}%</span></div>
    </div>`).join('');

  // Per-property cards
  const propCards=KEYS.map(k=>{
    const propWeeks=weeks.filter(w=>w.scores?.[k]);
    const pw=propWeeks.filter(w=>w.scores[k].result==='worked').length;
    const pp=propWeeks.filter(w=>w.scores[k].result==='partial').length;
    const pf=propWeeks.filter(w=>w.scores[k].result==='failed').length;
    const pa=propWeeks.length>0?Math.round((pw+pp*.5)/propWeeks.length*100):0;
    const paColor=pa>=70?'var(--green)':pa>=50?'var(--yellow)':'var(--red)';
    const recentWeeks=propWeeks.slice(-4).reverse();
    const failures=getConsecutiveFailures(k);
    return`<div class="results-card">
      <div class="results-card-header">
        <div>
          <div style="font-weight:600;font-size:13px">${k}</div>
          <div class="muted" style="font-size:11px;margin-top:2px">${PROPS[k].market} · ${propWeeks.length} weeks tracked</div>
          ${failures>=2?`<div style="font-size:10px;color:var(--red);margin-top:4px">⚠️ ${failures} consecutive failures — escalating</div>`:''}
        </div>
        <div class="accuracy-ring">
          <div class="accuracy-pct" style="color:${paColor}">${pa}%</div>
          <div class="accuracy-label">Accuracy</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:12px">
        <div style="flex:1;text-align:center;background:rgba(62,207,142,.08);border-radius:6px;padding:8px">
          <div style="font-size:18px;font-weight:700;color:var(--green);font-family:var(--mono)">${pw}</div>
          <div style="font-size:10px;color:var(--text-muted)">Worked</div>
        </div>
        <div style="flex:1;text-align:center;background:rgba(240,197,91,.08);border-radius:6px;padding:8px">
          <div style="font-size:18px;font-weight:700;color:var(--yellow);font-family:var(--mono)">${pp}</div>
          <div style="font-size:10px;color:var(--text-muted)">Partial</div>
        </div>
        <div style="flex:1;text-align:center;background:rgba(240,91,91,.08);border-radius:6px;padding:8px">
          <div style="font-size:18px;font-weight:700;color:var(--red);font-family:var(--mono)">${pf}</div>
          <div style="font-size:10px;color:var(--text-muted)">Failed</div>
        </div>
      </div>
      ${recentWeeks.map(w=>`
        <div class="weekly-row">
          <span class="weekly-date">${w.date}</span>
          <span class="weekly-action">${w.scores[k]?.prevAction?.substring(0,60)||'—'}${(w.scores[k]?.prevAction?.length||0)>60?'…':''}</span>
          <span class="result-chip ${w.scores[k]?.result||'pending'}">${(w.scores[k]?.result||'—').toUpperCase()}</span>
        </div>`).join('')}
    </div>`;
  }).join('');

  return`
    <div class="portfolio-accuracy">
      <div>
        <div class="big-number">${accuracy}%</div>
        <div class="big-label">Portfolio Accuracy Score</div>
        <div class="muted" style="font-size:11px;margin-top:4px">${totalWeeks} weeks tracked · ${totalScored} recommendations scored</div>
      </div>
      <div class="accuracy-breakdown">
        <div class="acc-stat"><div class="acc-stat-num green">${totalWorked}</div><div class="acc-stat-label">Worked</div></div>
        <div class="acc-stat"><div class="acc-stat-num yellow">${totalPartial}</div><div class="acc-stat-label">Partial</div></div>
        <div class="acc-stat"><div class="acc-stat-num red">${totalFailed}</div><div class="acc-stat-label">Failed</div></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:24px">
      <div>${monthlyHTML||'<div class="muted" style="font-size:12px">Monthly rollups appear after 4+ weeks of data.</div>'}</div>
      <div class="results-grid">${propCards}</div>
    </div>
  `;
}

// ─── RUN ANALYSIS ─────────────────────────────────────────────
async function runAnalysis(){
  if(!csvData)return;
  const ak=getAnthropicKey();
  if(!ak||!ak.startsWith('sk-ant-')){toast('⚠️ Enter your Anthropic API key first.');return;}
  const gh=getGithubToken();
  if(!gh){toast('⚠️ Enter your GitHub token first.');return;}

  const btn=document.getElementById('run-btn'),sp=document.getElementById('run-spinner'),lbl=document.getElementById('run-label'),st=document.getElementById('run-status');
  btn.disabled=true;sp.style.display='block';lbl.textContent='Analyzing…';

  // Score last week's results
  const lastWeekScores=scoreLastWeek();

  for(let i=0;i<KEYS.length;i++){
    const k=KEYS[i];st.textContent=`Analyzing ${k} (${i+1}/${KEYS.length})…`;
    const sk=k.replace(/\s/g,'-');
    ['d30','d60','d90','d120'].forEach(w=>{const el=document.getElementById(`act-${sk}-${w}`);if(el)el.innerHTML='<div class="loading-shimmer"></div>';});
    try{results[k]=await analyzeOne(k,lastWeekScores[k]);updateUI(k,results[k]);}
    catch(e){results[k]={error:true,diagnosis:'Analysis failed.',actions:{d30:'Error',d60:'Error',d90:'Error',d120:'Error'},priority_actions:['Analysis failed — try again'],key_issue:'Error',confidence:'LOW'};}
    await new Promise(r=>setTimeout(r,500));
  }

  // Save to GitHub
  st.textContent='Saving results to GitHub…';
  await saveWeeklyHistory(lastWeekScores);

  // Rebuild UI
  document.getElementById('port-grid').innerHTML=KEYS.map(k=>portCard(k)).join('');
  const resultsPanel=document.getElementById('panel-results');
  if(resultsPanel)resultsPanel.innerHTML=buildResultsTab();

  btn.disabled=false;sp.style.display='none';lbl.textContent='▶ Re-run Analysis';
  st.textContent=`✓ Done — ${new Date().toLocaleTimeString()}`;
  toast('✓ Analysis complete — results saved to GitHub.');
}

async function saveWeeklyHistory(scores){
  const history=historyData.weeks?[...historyData.weeks]:[];
  const weekEntry={
    date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    scores,
    properties:{}
  };
  KEYS.forEach(k=>{
    const d=getRow(k);
    const r=results[k];
    if(d&&r){
      weekEntry.properties[k]={
        occ30:d.occ30,occ60:d.occ60,occ90:d.occ90,
        occ30_status:status(d.occ30,PROPS[k].pace.d30).label,
        adr:d.adr,revpar:d.revpar,
        priority_actions:r.priority_actions,
        key_issue:r.key_issue,
        confidence:r.confidence,
        settings:r.settings
      };
    }
  });
  history.push(weekEntry);

  // Monthly rollup
  const monthly=historyData.monthly||{};
  const monthKey=new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'});
  if(!monthly[monthKey])monthly[monthKey]={weeks:0,worked:0,partial:0,failed:0,accuracy:0};
  monthly[monthKey].weeks++;
  Object.values(scores).forEach(s=>{
    if(s.result==='worked')monthly[monthKey].worked++;
    else if(s.result==='partial')monthly[monthKey].partial++;
    else if(s.result==='failed')monthly[monthKey].failed++;
  });
  const mo=monthly[monthKey];
  const total=mo.worked+mo.partial+mo.failed;
  mo.accuracy=total>0?Math.round((mo.worked+mo.partial*.5)/total*100):0;

  const newHistory={weeks:history.slice(-52),monthly};// Keep 1 year max
  historyData=newHistory;
  await saveHistory(newHistory);
}

async function analyzeOne(k,lastWeekScore){
  const p=PROPS[k],d=getRow(k);
  if(!d)return{diagnosis:`"${p.csvName}" not matched in CSV. Check listing name in PriceLabs.`,evidence:'—',rules:'RM-010 Exception Handling',expected:'—',key_issue:'CSV match failed — verify listing name',confidence:'LOW',escalate:false,priority_actions:['Verify listing name in PriceLabs CSV matches exactly'],actions:{d30:'N/A — CSV match failed',d60:'N/A',d90:'N/A',d120:'N/A'},settings:{base:'N/A',min:'N/A',max:'N/A',weekday:'N/A'}};

  const s30=status(d.occ30,p.pace.d30),s60=status(d.occ60,p.pace.d60),s90=status(d.occ90,p.pace.d90),s120=status(d.occ120,p.pace.d120);
  const failures=getConsecutiveFailures(k);
  const recentLog=p.log.slice(0,3).map(e=>`${e.date}: ${e.issue} → ${e.action}`).join('\n');

  // Severity grade for 30d window
  const v30=s30.v!==null?Math.abs(Math.round(s30.v*100)):0;
  const severity30=v30<=10?'Slightly Behind (≤10pts)':v30<=25?'Moderately Behind (10–25pts)':'Critically Behind (>25pts)';

  const lastWeekContext=lastWeekScore?`
LAST WEEK FEEDBACK LOOP:
Action taken: ${lastWeekScore.prevAction}
30d occ last week: ${Math.round((lastWeekScore.prevOcc30||0)*100)}%
30d occ this week: ${Math.round((lastWeekScore.newOcc30||0)*100)}%
Scored result: ${lastWeekScore.result?.toUpperCase()||'PENDING'}
${lastWeekScore.result==='worked'?'→ RM-016 APPLIES: Hold After Positive Response. Do not reduce further this cycle. Confirm 60d follows 30d.':''}
${lastWeekScore.result==='partial'?'→ Partial improvement. Monitor one more cycle before changing variables (RM-019).':''}
${lastWeekScore.result==='failed'?'→ Strategy did not move the needle. Consider alternative approach.':''}
${failures>=2?`⚠️ RM-047 ESCALATION SIGNAL: ${failures} consecutive failed strategies. AIRA must flag this for DJ review AND recommend a fundamentally different approach. Set escalate:true in output.`:''}
`:'No previous week data — first run or history not loaded.';

  const prompt=`You are AIRA, ProHosts AI Revenue Agent. Execute the ProHosts RM Decision Engine v2.1. Return ONLY valid JSON — no markdown, no preamble, no trailing text.

PROPERTY: ${k} | ${p.market} | ${p.bedrooms}BR
MARGIN FLOOR: $${p.floor}

PRICELABS DATA:
Base ${fd(d.base)} (target ${p.pl.base_range}) | Min ${fd(d.min)} (target ${p.pl.min_range}) | Max ${fd(d.max)} (target ${p.pl.max_range})
ADR(P) ${fd(d.adr)} target ${p.targets.adr} | RevPAR(P) ${fd(d.revpar)} target ${p.targets.revpar} | Occ(P) ${fp(d.occ_past)} target ${p.targets.occ}
Revenue YTD ${fd(d.rev_ytd)} target ${p.targets.revenue} | 7d bookings ${d.n7} | 15d bookings ${d.n15} | Last booked ${d.last_book}

OCC PACE (N):
30d ${fp(d.occ30)} vs ${Math.round(p.pace.d30*100)}% → ${s30.label} (${fv(s30.v)}) | severity: ${severity30}
60d ${fp(d.occ60)} vs ${Math.round(p.pace.d60*100)}% → ${s60.label} (${fv(s60.v)})
90d ${fp(d.occ90)} vs ${Math.round(p.pace.d90*100)}% → ${s90.label} (${fv(s90.v)})
120d ${fp(d.occ120)} vs ${Math.round(p.pace.d120*100)}% → ${s120.label} (${fv(s120.v)})
Market occ: 30d ${fp(d.mocc30)} | 60d ${fp(d.mocc60)} | 90d ${fp(d.mocc90)} | Weekend occ(N 30d) ${fp(d.wocc30)}

CURRENT STRUCTURE: LMD ${p.pl.lmd} | FOP ${p.pl.fop} | LOS ${p.pl.los} | Weekend ${p.pl.weekend}

PROPERTY CONTEXT: ${p.context}
PROPERTY RULES: ${p.rules}

RECENT DECISIONS:
${recentLog}

${lastWeekContext}

EXECUTE v2.1 GATES IN ORDER:

GATE 1 — DATA INTEGRITY (Policy — runs first):
RM-010: Check exceptions (blocks, holidays, new listing, disasters). If found: flag, do not price.
RM-042: Blocked nights excluded from denominators. Mark window unreadable if blocked.
RM-039: Legacy inherited reservations = false occupancy signal. Evaluate new bookings only.
NOTE: Moonlight Sunrise June/July blocked for fire remediation — 30d/60d unreadable.

GATE 2 — GUARDRAILS (Policy — never override):
RM-044: No price or discount stack below $${p.floor} floor.
RM-047: Set escalate:true (do NOT act) if: revenue -15%+ WoW OR 14+ bookingless days while behind OR major event dates unbooked inside 45d OR recommendation breaches floor OR ${failures>=2?`ACTIVE — ${failures} consecutive failures`:'not triggered'}.

GATE 3 — HOLD RULES (block action rules on same variable):
RM-016: Last week WORKED → hold all reductions this cycle. Confirm 60d follows 30d upward.
RM-018: All windows ±5pts AND ≥1 booking last 7d → no changes. Log "no action — on pace."
RM-019: Structural change last cycle → do not reverse/deepen that variable. 7-10d lag expected.
RM-020: Lead ≥60d AND 0 bookings 7-15d AND all windows on/ahead → hold. Log velocity silence.

GATE 4 — DIAGNOSE FIRST:
RM-021: Occ below target BUT weekend occ ≥85% → weekday problem ONLY. Sun-Thu discounts. Never lower base/min/weekend for weekday problem.
RM-009: Market occ healthy but property low → audit listing before pricing. Flag.
RM-030: Classify booking window — Late (<25d lead, ≥30% inside 7d): FOP 0-8%, strong LMD. Early (≥60d lead): FOP 10-35%, judge far windows.

GATE 5 — ACTIONS (one lever per window, 30d→60d→90d→120d priority):
30d lever: weekday pricing / LMD | 60d lever: base + month-targeted discounts (RM-022) | 90d lever: FOP only (RM-029) | 120d: usually nothing

RM-002 by severity: Slightly Behind(≤10pts): base -3-5%. Moderately(10-25pts): base -5-8% + weekdays -5-10% + 21-30d discounts. Critically(>25pts or 10+ bookingless days): base -8-15% + min -5-10% temp + full curve + overrides + Booking Recency (RM-046).
RM-003: 30d behind → weekday only. 60-90d → base -3-5% + FOP adjust. Never blanket discount.
RM-004: Weekends filling 30+d early → raise Fri/Sat +10-15% on OPEN nights only.
RM-005: LMD curve MUST deepen toward arrival: 30d-5%/21d-10%/14d-12-15%/7d-18-20%/3d-22-25%/1d-25-30%. Inverted = invalid.
RM-006: Strong demand 45+d → 45-59d +5-10% / 60-89d +8-15% / 90+d +10-20%.
RM-011: Occ on pace + ADR below target → raise pricing.
RM-025: Weekdays pinned to min → lift weekdays OR lower base to reopen spread. Never both.
RM-026: Keep min ~60-70% of base. Never collapse spread.
RM-028: Near window behind + far ahead → discount near AND raise FOP simultaneously (1 structural move).
RM-032: Soft season + market demand down → zero FOP, LMD 30-40%/14d, enable Recency, lower min toward floor, keep weekends.
RM-035: Market occ near zero + multiple cuts failed → STOP cutting. Expand channels. Rework listing.
RM-037: Pace +10pts(30d) or +5pts(60d) or trailing occ ≥85% → raise base 5-10%, weekends +10-15% on open nights.

GATE 6 — CAP: Max 2 decisions this cycle. One variable = one decision. Cite rule ID + tier for every recommendation.

Confidence tiers: Policy(absolute): RM-010,044,047,051. Proven(multi-evidence): most others. Provisional(single obs): RM-011-015,023,027,031,034,036,038,041,050. Hypothesis(pending): RM-035.

Return ONLY this exact JSON object:
{
  "diagnosis": "2-3 sentences. Root cause, season-accurate.",
  "evidence": "Specific metrics supporting diagnosis.",
  "rules": "Every rule fired: ID + tier. E.g. RM-021(Proven), RM-003(Proven), RM-022(Proven).",
  "expected": "Expected outcome and timeframe.",
  "key_issue": "5-10 words. Root cause framed.",
  "confidence": "HIGH or MEDIUM or LOW",
  "escalate": false,
  "escalate_reason": "",
  "priority_actions": [
    "PRIORITY 1: [RM-XXX (Tier)] Exact PriceLabs instruction with specific numbers and where to find the setting.",
    "PRIORITY 2: [RM-XXX (Tier)] Second action with exact specifics."
  ],
  "actions": {
    "d30": "Rule-cited action for 30d window.",
    "d60": "Rule-cited action for 60d window.",
    "d90": "Rule-cited action for 90d window.",
    "d120": "Rule-cited action for 120d window."
  },
  "settings": {
    "base": "e.g. Lower to $181 (RM-002 Moderately Behind) or Hold at $190 (RM-016)",
    "min": "e.g. Hold at $125 (RM-026 spread protection) or Lower to $115 temp (RM-002 Critically)",
    "max": "e.g. Hold at $450 or Raise to $475 (RM-027)",
    "weekday": "e.g. -10% Sun-Thu inside 21d (RM-022) or None (RM-018 on pace)"
  }
}`;

    const ak=getAnthropicKey();
  console.log('Analyzing '+k+' — prompt length: '+(prompt.length)+' chars');
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ak,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:prompt}]})
  });
  const data=await resp.json();
  const txt=(data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();
  try{
    const parsed=JSON.parse(txt);
    if(parsed.escalate)parsed.confidence='LOW';
    return parsed;
  } catch(parseErr){
    // Log full raw response to console for debugging
    console.error('AIRA parse error for '+k);
    console.error('Raw API response:', JSON.stringify(data, null, 2));
    console.error('Extracted text:', txt);
    // Try to extract JSON from within the text if wrapped
    const jsonMatch=txt.match(/\{[\s\S]*\}/);
    if(jsonMatch){
      try{
        const parsed=JSON.parse(jsonMatch[0]);
        if(parsed.escalate)parsed.confidence='LOW';
        console.log('Recovered JSON from match');
        return parsed;
      } catch(e2){console.error('Recovery also failed:',e2);}
    }
    // Check if API returned an error object
    if(data.error){
      return{diagnosis:`API Error: ${data.error.type} — ${data.error.message}`,evidence:'Check your API key and billing at console.anthropic.com',rules:'—',expected:'—',key_issue:`API error: ${data.error.type}`,confidence:'LOW',escalate:false,priority_actions:[`API Error: ${data.error.message}`],actions:{d30:'API error',d60:'API error',d90:'API error',d120:'API error'},settings:{base:'—',min:'—',max:'—',weekday:'—'}};
    }
    return{diagnosis:`Parse error. Raw response logged to browser console (F12). First 500 chars: ${txt.substring(0,500)}`,evidence:'Open browser console (F12 → Console tab) to see full API response',rules:'—',expected:'—',key_issue:'JSON parse error — see console',confidence:'LOW',escalate:false,priority_actions:['Open browser console (F12) to see raw API response and diagnose'],actions:{d30:'Parse error — see console',d60:'—',d90:'—',d120:'—'},settings:{base:'—',min:'—',max:'—',weekday:'—'}};
  }
}

function updateUI(k,r){
  const sk=k.replace(/\s/g,'-'),d=getRow(k),p=PROPS[k];
  ['d30','d60','d90','d120'].forEach(w=>{const el=document.getElementById(`act-${sk}-${w}`);if(el&&r.actions?.[w])el.innerHTML=r.actions[w];});
  ['base','min','max'].forEach(s=>{const el=document.getElementById(`rec-${s}-${sk}`);if(el&&r.settings?.[s]){el.textContent=r.settings[s];el.style.color='var(--accent)';}});
  const wd=document.getElementById(`rec-wd-${sk}`);if(wd&&r.settings?.weekday)wd.textContent=r.settings.weekday;
  const db=document.getElementById(`diag-body-${sk}`);if(db)db.innerHTML=diagHTML(r);
  const dh=document.getElementById(`diag-${sk}`)?.querySelector('.diagnosis-header');
  if(dh&&r.confidence){let b=dh.querySelector('.confidence-badge');if(!b){b=document.createElement('span');b.className='confidence-badge';dh.appendChild(b);}b.className=`confidence-badge ${(r.confidence||'medium').toLowerCase()}`;b.textContent=`${r.confidence} CONFIDENCE`;}
  const logEl=document.getElementById(`log-${sk}`);
  if(logEl&&d){
    const entry=`<div class="log-entry" style="border-color:var(--accent);border-width:1.5px">
      <div class="log-meta">
        <span class="log-date" style="background:var(--accent);color:#000;padding:1px 6px;border-radius:4px">THIS WEEK</span>
        <span class="log-occ">${fp(d.occ30)} 30d occ</span>
        <span class="log-7d">7d: ${d.n7}</span><span class="log-15d">15d: ${d.n15}</span>
        <span class="log-issue">${r.key_issue||''}</span>
      </div>
      <div class="log-action">${(r.priority_actions||[]).join(' · ')}</div>
    </div>`;
    const existing=logEl.querySelector('[style*="border-color:var(--accent)"]');
    if(existing)existing.remove();
    logEl.insertAdjacentHTML('afterbegin',entry);
  }
  const dot=document.getElementById(`dot-${sk}`);
  if(dot&&d){const ss=[status(d.occ30,p.pace.d30),status(d.occ60,p.pace.d60),status(d.occ90,p.pace.d90)];dot.className=`tab-dot ${dotCls(ss)}`;}
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
